name: Build Python (Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          set -eux
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
          python3 \
          winetricks \
          wget \
          curl \
          libwbclient0 \
          unzip \
          7zip \
          wine
          wine --version

      - name: Build project
        run: |
          chmod +x Cross_compile.sh
          ./Cross_compile.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: OutlastTogether
          path: |
            OutlastTogether.exe

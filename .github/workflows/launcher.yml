name: Build Launcher

on:
  workflow_dispatch

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nuitka
        shell: pwsh
        run: |
          choco install -y mingw python312
          pip install nuitka --break-system-packages
          .\build.bat

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: Launcher
          path: OutlastTogether.exe
